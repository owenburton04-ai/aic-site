<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Content · Applied Intelligence Collective</title>
</head>
<body>
  <!-- Netlify Identity: handles login for the CMS once enabled on the Netlify site -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <!-- Decap CMS (formerly Netlify CMS) -->
  <script src="https://unpkg.com/decap-cms@^3.6.0/dist/decap-cms.js"></script>
  <script>
    // After an Identity invite/login, send the user into the CMS.
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", function (user) {
        if (!user) {
          window.netlifyIdentity.on("login", function () { document.location.href = "/admin/"; });
        }
      });
    }
  </script>
</body>
</html>
